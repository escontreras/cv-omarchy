name: Deploy a GitHub Pages

# Se ejecuta en cada push a main, o manualmente desde la pestaña Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el deploy a Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez; no cancela uno en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.2.2
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install

      - name: Build con Astro
        run: pnpm run build

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
